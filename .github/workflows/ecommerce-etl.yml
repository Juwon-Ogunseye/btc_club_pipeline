name: E-Commerce ETL Pipeline (PostgreSQL)

on:
  push:
    paths:
      - 'ecommerce-pipeline/**'
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"

jobs:
  run-ecommerce-etl:
    runs-on: ubuntu-latest
    env:
      ETL_SOURCE: postgres

    steps:
      - name: Checkout repo content
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install psycopg2-binary pandas duckdb python-dotenv requests boto3 awscli

      - name: Download AWS RDS SSL Certificate
        run: |
          mkdir -p ./certs
          wget https://truststore.pki.rds.amazonaws.com/global/global-bundle.pem -O ./global-bundle.pem

      - name: Run E-Commerce ETL pipeline
        working-directory: ecommerce-pipeline
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          RDS_HOST: ${{ secrets.RDS_HOST }}
          RDS_PORT: ${{ secrets.RDS_PORT }}
          RDS_DATABASE: ${{ secrets.RDS_DATABASE }}
          RDS_USER: ${{ secrets.RDS_USER }}
          RDS_SECRET_ARN: ${{ secrets.RDS_SECRET_ARN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          RDS_PASSWORD: ${{ secrets.RDS_PASSWORD }}
          AWS_DEFAULT_REGION: us-east-2
          ETL_SOURCE: postgres
          MOTHERDUCK_DB: ecommerce
          SSL_CERT_PATH: ../global-bundle.pem
        run: python main.py

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: etl-logs-ecommerce
          path: ecommerce-pipeline/logs/

      - name: Check for changes
        id: git-check
        run: |
          git config user.name 'github-actions'
          git config user.email 'github-actions@github.com'
          git add .
          git diff --staged --quiet || echo "changes=true" >> $GITHUB_ENV

      - name: Commit and push if changes
        if: env.changes == 'true'
        run: |
          git commit -m "📊 Update e-commerce data index [ecommerce-etl]"
          git push