name: CEO Metrics Report

on:
  workflow_dispatch:
  schedule:
    - cron: "5 1 * * *"

jobs:
  run-ceo-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo content
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install "duckdb==1.5.3" python-dotenv requests

      - name: Run CEO Metrics Report
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python ceo_metrics.py